[env:sentinel-esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_src_filter =
    +<*.cpp>
    -<traffic_light_test.cpp>
    -<wifi_only.cpp>

lib_deps =
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/RTClib @ ^2.1.4
    adafruit/Adafruit SHT31 Library @ ^2.2.2
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.12.1
    me-no-dev/AsyncTCP @ ^3.3.2

[env:traffic-light-test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_src_filter =
    +<traffic_light_test.cpp>

[env:wifi-only]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_src_filter =
    +<wifi_only.cpp>

lib_deps =
    me-no-dev/AsyncTCP @ ^3.3.2